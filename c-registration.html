                        <!--  Criminal Registeration  -->

  <div class="container bg-white text-inverse p-3 w-50">
    <h3 class="desplay-5 text-white text-center bg-inverse mr-2 p-2">Fill the criminal information Form</h3>
    <form class="form-group form-block w-75 p-2">
      <div class="form-group">
        <input type="text" id="c-first-name" class="form-control" placeholder="Enter First Name">
      </div>

      <div class="form-group">
        <input type="text" id="c-last-name" class="form-control" placeholder="Enter Last Name">
      </div>
      
      <div class="form-group">
        <label for="gender" class="mr-2">Gender</label>
        <select class="form-control mr-2" id="gender">
            <option>Male</option>
            <option>Female</option>
          
      </div>
      
      <div class="form-group">
        <input type="text" id="c-age" class="form-control mr-2 w-50" placeholder="Enter Age">
      </div>
      
      <div class="form-group">
        <input type="text" id="c-address" class="form-control mr-2" placeholder="Enter Address">
      </div>
      
      <div class="form-group">
        <input type="date" id="c-date" name="c-date" placeholder="Enter captured Date">
      </div>
      
      <div class="form-group">
        <div class="col-md-3">
        <div class="dropdown">
            <button class="btn btn-block dropdown-toggle w-100" type="button" data-toggle="dropdown">Catagory
            </button>
            
            <div class="dropdown-menu">
            <a class="dropdown-item" href="#">Murder</a>
            <a class="dropdown-item" href="#">Drug deal</a>
            <a class="dropdown-item" href="#">Robery</a>
            </div>
        </div>
        </div>
      </div>
      
      <div class="form-group"> 
        <textarea class="w-100 h-5" rows="6" cols="25" placeholder="Enter Crime description here" ></textarea>
      </div>
      
      <div class="form-group">
        <label for="file">Attach File</label>
        <input type="file" class="form-control-file" id="file">
      </div>
        <div class="form-group">
          <small class="form-text text-muted" id="fileHelp">Attach PDF if Possible</small>
        </div>
      
      
      <div class="form-group">
        <label class="form-check-label mr-2">
            <input type="checkbox" class="form-check-input"> Confirm Registration
        </label>
      </div>
      
      <div class="form-group">
        <button class="btn btn-warning mr-2" type="submit">Submit</button>
      </div>
    </form>
  </div>
